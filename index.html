// ----------------------------------------------------------------------------
// ▣ 탭(게시판) 순서를 마우스로 드래그해서 바꾸는 기능 (관리자 전용)
// - 브라우저에 원래 내장되어 있는 "드래그 앤 드롭" 기능을 사용합니다.
// - 순서는 draggedTabId(지금 손으로 집어서 옮기고 있는 탭)를,
//   마우스를 놓은(drop) 위치에 있던 탭 자리로 끼워넣는 방식으로 계산합니다.
// - 순서가 바뀌면 화면을 바로 다시 그린 뒤(사용자는 바로 결과를 봄),
//   뒤이어 서버에도 새 순서(sort_order 숫자)를 하나씩 저장해서 다음에 접속해도 유지되게 합니다.
// ----------------------------------------------------------------------------
let draggedTabId = null; // 지금 손으로 집어서 드래그하고 있는 탭의 id (드래그 중이 아니면 null)

// 탭을 손으로 "집는" 순간(마우스 버튼을 누른 채 움직이기 시작하는 순간) 실행됨
function onTabDragStart(e, tabId){
  if(!isAdmin) return; // 관리자가 아니면 애초에 draggable="false"라서 여기 올 일이 없지만, 이중 안전장치
  draggedTabId = tabId;
  e.dataTransfer.effectAllowed = 'move';
  e.currentTarget.classList.add('dragging'); // 집은 탭을 살짝 투명하게 표시
}

// 집은 탭을 다른 탭 위로 끌고 지나가는 동안 계속(아주 짧은 간격으로) 실행됨
function onTabDragOver(e, overTabId){
  if(!draggedTabId) return;
  e.preventDefault(); // ★ 이 줄이 없으면 브라우저가 "여긴 놓을 수 없는 자리"로 취급해서 drop이 아예 발생하지 않음
  e.dataTransfer.dropEffect = 'move';
  if(overTabId !== draggedTabId){
    e.currentTarget.classList.add('drag-over'); // 지금 위에 올라가 있는 탭 자리에 초록 세로줄 표시
  }
}
// 다른 탭 위에서 벗어나면(더 이상 그 자리에 놓을 게 아니면) 위 초록 세로줄 표시를 지움
function onTabDragLeave(e){
  e.currentTarget.classList.remove('drag-over');
}

// 마우스 버튼을 놓아서(drop) 탭을 실제로 그 자리에 끼워넣는 순간 실행됨
async function onTabDrop(e, targetTabId){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!draggedTabId || draggedTabId === targetTabId) return; // 자기 자신 위에 놓으면 아무 일도 안 함

  const fromIdx = tabs.findIndex(t => t.id === draggedTabId);
  const toIdx = tabs.findIndex(t => t.id === targetTabId);
  if(fromIdx === -1 || toIdx === -1) return;

  // 배열에서 집었던 탭을 빼낸 뒤, 놓은 자리에 다시 끼워넣음 (화면에 보이는 순서를 그대로 바꾸는 것)
  const [moved] = tabs.splice(fromIdx, 1);
  tabs.splice(toIdx, 0, moved);
  // 새로 정렬된 순서대로 sort_order 값을 0,1,2,3...으로 다시 매김
  tabs.forEach((t, i) => { t.sort_order = i; });

  renderTabs(); // 사용자에게는 바뀐 순서를 곧바로 보여줌

  // 서버(Supabase)에도 바뀐 순서를 저장해서, 새로고침하거나 다른 사람이 봐도 이 순서가 유지되게 함
  try{
    setSyncNote('탭 순서 저장 중...');
    await Promise.all(tabs.map(t =>
      sb(`board_tabs?id=eq.${t.id}`, {
        method:'PATCH', prefer:'return=minimal',
        body: JSON.stringify({ sort_order:t.sort_order })
      })
    ));
    setSyncNote('탭 순서 저장됨');
  }catch(err){
    console.error(err);
    setSyncNote('탭 순서 저장 실패: ' + err.message, true);
  }
}

// 드래그가 끝나는 순간(놓았든, 도중에 ESC 등으로 취소했든) 항상 실행되어 뒷정리를 함
function onTabDragEnd(e){
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.tab-item.drag-over').forEach(el => el.classList.remove('drag-over'));
  draggedTabId = null;
}

// ----------------------------------------------------------------------------
// ▣ 게시글 목록 불러오기 / 검색 / 화면에 그리기
// - 지금 선택된 탭(activeTabId)에 속한 글만 tab_id 조건으로 걸러서 가져옵니다.
// ----------------------------------------------------------------------------
async function loadPosts(){
  setSyncStatus('loading');
  try{
    posts = await sb(`posts?select=*&tab_id=eq.${activeTabId}&order=created_at.desc`);
    setSyncStatus('ok');
    render();
  }catch(err){
    console.error(err);
    setSyncStatus('error');
    document.getElementById('tbody').innerHTML =
      `<tr><td colspan="3" class="empty">불러오기 실패: ${err.message}</td></tr>`;
  }
}
// 검색창(맨 위 toolbar-nav)에 글자를 입력할 때마다 실행됨.
// 지금 선택된 탭이 일반 게시판이면 글 제목을 검색하고, 드롭테이블 탭이면 몬스터/아이템 이름을 검색합니다.
function onSearchInput(value){
  const activeTab = tabs.find(t => t.id === activeTabId);
  if(activeTab && activeTab.tab_type === 'droptable'){
    dropSearchQuery = value;
    renderZoneContent();
  } else {
    searchQuery = value;
    render();
  }
}
function render(){
  // 큰 제목(.board-title)에 지금 선택된 탭의 이름을 표시함
  const curTab = tabs.find(t => t.id === activeTabId);
  document.getElementById('boardTitleText').textContent = curTab ? curTab.label : '';

  const tbody = document.getElementById('tbody');
  const q = searchQuery.trim().toLowerCase();
  let filtered = posts;
  if(q){
    filtered = filtered.filter(p => (p.title || '').toLowerCase().includes(q));
  }
  if(filtered.length === 0){
    const msg = q
      ? '검색 결과가 없습니다.'
      : '등록된 글이 없습니다.' + (isAdmin ? ' 아래 + 새글쓰기 버튼을 눌러보세요.' : '');
    tbody.innerHTML = `<tr><td colspan="3" class="empty">${msg}</td></tr>`;
    return;
  }
  // 번호(순번)는 최신 글이 가장 큰 숫자를 갖도록 매깁니다 (일반적인 게시판 번호 매기는 방식과 동일)
  const total = filtered.length;
  tbody.innerHTML = filtered.map((p, idx) => `
    <tr class="post-row" onclick="openDetail('${p.id}')">
      <td class="col-seq">${total - idx}</td>
      <td class="col-title"><span class="post-title-text">${escapeHtml(p.title) || '(제목 없음)'}</span></td>
      <td class="col-date">${formatDate(p.created_at)}</td>
    </tr>
  `).join('');
}
function refreshNow(){
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  setTimeout(() => btn.classList.remove('spinning'), 600);
  loadPosts();
}

// ----------------------------------------------------------------------------
// ▣ 게시글 상세보기 팝업
// ----------------------------------------------------------------------------
function openDetail(id){
  const post = posts.find(p => p.id === id);
  if(!post) return;
  currentDetailId = id;
  document.getElementById('detailTitle').textContent = post.title || '(제목 없음)';
  document.getElementById('detailDate').textContent = formatDate(post.created_at);
  document.getElementById('detailContent').innerHTML = post.content || '';
  document.getElementById('detailEditBtn').style.display = isAdmin ? 'inline-flex' : 'none';
  document.getElementById('detailDeleteBtn').style.display = isAdmin ? 'inline-flex' : 'none';
  document.getElementById('detailOverlay').classList.add('open');
}
function closeDetailModal(){
  document.getElementById('detailOverlay').classList.remove('open');
  currentDetailId = null;
}
async function deleteCurrentPost(){
  if(!currentDetailId) return;
  if(!confirm('이 글을 삭제할까요? 삭제하면 되돌릴 수 없습니다.')) return;
  try{
    setSyncNote('삭제 중...');
    await sb(`posts?id=eq.${currentDetailId}`, { method:'DELETE', prefer:'return=minimal' });
    closeDetailModal();
    await loadPosts();
    setSyncNote('삭제 완료');
  }catch(err){
    console.error(err);
    setSyncNote('삭제 실패: ' + err.message, true);
  }
}
function openEditFromDetail(){
  const post = posts.find(p => p.id === currentDetailId);
  if(!post) return;
  closeDetailModal();
  openWriteModal(post);
}

// ----------------------------------------------------------------------------
// ▣ 글쓰기 / 수정 팝업
// ----------------------------------------------------------------------------
function openWriteModal(post){
  editingPostId = post ? post.id : null;
  document.getElementById('writeModalTitle').textContent = post ? '글 수정' : '새 글쓰기';
  document.getElementById('writeTitleInput').value = post ? (post.title || '') : '';
  document.getElementById('writeContentEditor').innerHTML = post ? (post.content || '') : '';
  document.getElementById('writeOverlay').classList.add('open');
  setTimeout(() => document.getElementById('writeTitleInput').focus(), 50);
}
function closeWriteModal(){
  document.getElementById('writeOverlay').classList.remove('open');
  editingPostId = null;
}
async function savePost(){
  const title = document.getElementById('writeTitleInput').value.trim();
  const content = document.getElementById('writeContentEditor').innerHTML.trim();
  if(!title && !content){
    alert('제목이나 내용 중 하나는 입력해주세요.');
    return;
  }
  try{
    setSyncNote('저장 중...');
    if(editingPostId){
      // 수정: 원래 있던 글의 제목/내용만 바꿈 (어느 탭 소속인지는 그대로 유지)
      await sb(`posts?id=eq.${editingPostId}`, {
        method:'PATCH', prefer:'return=minimal',
        body: JSON.stringify({ title, content })
      });
    } else {
      // 새 글쓰기: 지금 선택되어 있는 탭(activeTabId) 소속으로 저장됨
      await sb('posts', {
        method:'POST',
        body: JSON.stringify({ title, content, tab_id: activeTabId })
      });
    }
    closeWriteModal();
    await loadPosts();
    setSyncNote('저장 완료');
  }catch(err){
    console.error(err);
    setSyncNote('저장 실패: ' + err.message, true);
  }
}

// ----------------------------------------------------------------------------
// ▣ 이미지 붙여넣기(Ctrl+V) 처리
// - 글쓰기/수정 팝업의 본문 입력 영역 안에서 이미지를 붙여넣으면(캡처 후 Ctrl+V 등),
//   그 이미지를 Supabase Storage(post-images 버킷)에 업로드하고,
//   업로드된 이미지의 공개 주소(URL)를 커서가 있던 자리에 <img> 태그로 바로 삽입합니다.
// ----------------------------------------------------------------------------
document.getElementById('writeContentEditor').addEventListener('paste', async function(e){
  const items = (e.clipboardData || window.clipboardData).items;
  if(!items) return;
  for(const item of items){
    if(item.type && item.type.indexOf('image') !== -1){
      e.preventDefault(); // 이미지일 땐 브라우저 기본 붙여넣기 동작을 막고, 우리가 직접 업로드 후 삽입함
      const file = item.getAsFile();
      if(file) await uploadAndInsertImage(file);
      return; // 클립보드에 이미지가 여러 개 들어있어도 우선 첫 번째만 처리함 (보통 캡처 1장 기준)
    }
  }
  // 이미지가 아니라 일반 글자를 붙여넣은 경우엔 막지 않고 브라우저 기본 동작(그대로 붙여넣기)을 허용함
});

async function uploadAndInsertImage(file){
  setSyncNote('이미지 업로드 중...');
  try{
    const ext = (file.type.split('/')[1] || 'png').replace('jpeg', 'jpg');
    const fileName = `${Date.now()}_${Math.random().toString(36).slice(2,8)}.${ext}`;
    // ★ 이미지 업로드도 "쓰기" 동작이라, 관리자 로그인 출입증(access_token)을 실어서 보냅니다.
    //   (로그인 안 된 상태에서 이 함수가 불릴 일은 없지만, 혹시 몰라 로그인 안 됐으면 공개키로라도 시도함)
    const uploadToken = (adminSession && adminSession.access_token) ? adminSession.access_token : SUPABASE_KEY;
    const uploadRes = await fetch(`${SUPABASE_URL}/storage/v1/object/${IMAGE_BUCKET}/${fileName}`, {
      method: 'POST',
      headers: {
        'apikey': SUPABASE_KEY,
        'Authorization': `Bearer ${uploadToken}`,
        'Content-Type': file.type || 'image/png'
      },
      body: file
    });
    if(!uploadRes.ok){
      const errText = await uploadRes.text();
      throw new Error(`업로드 실패 ${uploadRes.status}: ${errText}`);
    }
    const publicUrl = `${SUPABASE_URL}/storage/v1/object/public/${IMAGE_BUCKET}/${fileName}`;
    document.execCommand('insertHTML', false, `<img src="${publicUrl}">`);
    setSyncNote('이미지 첨부 완료');
  }catch(err){
    console.error(err);
    setSyncNote('이미지 업로드 실패: ' + err.message, true);
    alert('이미지 업로드에 실패했습니다: ' + err.message);
  }
}

// ----------------------------------------------------------------------------
// ▣ 페이지가 열리자마자 실행되는 부분
// 1) 저장되어 있던 관리자 로그인 정보가 있으면 복원(또는 자동 갱신)하고
// 2) 그 결과에 맞춰 버튼/입력 가능 여부를 세팅하고
// 3) 헤더의 앱 이름을 서버에서 불러오고
// 4) 탭 목록과 그 안의 게시글을 불러옵니다
// ----------------------------------------------------------------------------
async function bootApp(){
  await tryRestoreAdminSession();
  updateAdminUI();
  loadAppTitle();
  bootTabsAndPosts();
}
bootApp();
</script>
